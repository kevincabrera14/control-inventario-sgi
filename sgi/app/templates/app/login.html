{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGI | Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-page">

    <!-- Canvas animado tipo "The End" de Minecraft -->
    <canvas id="endCanvas"></canvas>

    <div class="login-card">

        <div class="login-header">
            <div class="overlay">
                <div class="logo-icon">
                    <img src="{% static 'img/logo.png' %}" alt="SGI Logo" style="width: 40px; height: 40px; border-radius: 8px;">
                </div>
                <h4>SGI</h4>
                <small>Sistema de Gestión de Inventario</small>
            </div>
        </div>

        <div class="login-body">

            {% if error %}
            <div class="alert-error">
                <span>⚠ {{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" autocomplete="on">
                {% csrf_token %}

                <div class="field-wrap">
                    <label class="field-label">Usuario</label>
                    <input type="text" name="username" class="field-input"
                           placeholder="Ingresa tu usuario" required autofocus
                           autocomplete="username">
                </div>

                <div class="field-wrap">
                    <label class="field-label">Contraseña</label>
                    <input type="password" name="password" class="field-input"
                           placeholder="••••••••" required
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login">Ingresar al sistema</button>

            </form>

            <a href="{% url 'informacion' %}" class="btn-info">ℹ Información del sistema</a>

            <p class="login-footer">SGI &copy; 2025 &mdash; Control de Inventario</p>
        </div>

    </div>

    <!-- ===== JS: Recordar usuario (autocompletar al volver a entrar) ===== -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var usernameInput = document.querySelector('input[name="username"]');
        var passwordInput = document.querySelector('input[name="password"]');
        if (!usernameInput) return;

        // Autocompletar con el último usuario guardado
        var savedUsername = localStorage.getItem('sgi-last-username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
            if (passwordInput) passwordInput.focus();
        }

        // Guardar el username cada vez que se envía el formulario
        var loginForm = usernameInput.closest('form');
        if (loginForm) {
            loginForm.addEventListener('submit', function () {
                localStorage.setItem('sgi-last-username', usernameInput.value.trim());
            });
        }
    });
    </script>

    <!-- ===== JS: Animación "The End" de Minecraft ===== -->
    <script>
    (function () {
        const canvas = document.getElementById('endCanvas');
        const ctx = canvas.getContext('2d');

        // ── Paleta inspirada en The End ──────────────────────────────────────
        const PALETTE = {
            bg: '#0a0010',          // negro morado profundo
            stars: ['#ffffff', '#d8b4fe', '#a78bfa', '#7c3aed', '#c4b5fd'],
            blocks: [
                { fill: '#3b0764', stroke: '#7c3aed' },  // end stone morado
                { fill: '#1e1b4b', stroke: '#4338ca' },  // índigo
                { fill: '#14532d', stroke: '#16a34a' },  // verde esmeralda (ender)
                { fill: '#0f172a', stroke: '#6d28d9' },  // oscuro borde lila
            ],
            particles: ['#a78bfa', '#c084fc', '#818cf8', '#34d399', '#6ee7b7'],
        };

        // ── Estado de la escena ──────────────────────────────────────────────
        let W, H;
        let stars = [];
        let blocks = [];
        let particles = [];
        let nebulaClouds = [];
        let tick = 0;

        // ── Resize ────────────────────────────────────────────────────────────
        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initScene();
        }

        // ── Inicializar escena ────────────────────────────────────────────────
        function initScene() {
            // Estrellas
            stars = [];
            const starCount = Math.floor((W * H) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.5 + 0.3,
                    color: PALETTE.stars[Math.floor(Math.random() * PALETTE.stars.length)],
                    twinkleSpeed: Math.random() * 0.04 + 0.01,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    alpha: Math.random() * 0.6 + 0.4,
                });
            }

            // Bloques flotantes pixelados (End Stone)
            blocks = [];
            const blockCount = Math.max(8, Math.floor((W * H) / 18000));
            for (let i = 0; i < blockCount; i++) {
                spawnBlock(true);
            }

            // Nubes de nebulosa
            nebulaClouds = [];
            for (let i = 0; i < 5; i++) {
                nebulaClouds.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    rx: Math.random() * 200 + 100,
                    ry: Math.random() * 100 + 60,
                    alpha: Math.random() * 0.08 + 0.03,
                    color: ['#4c1d95','#1e1b4b','#064e3b','#3b0764'][Math.floor(Math.random()*4)],
                    speed: (Math.random() - 0.5) * 0.08,
                });
            }

            // Partículas del End
            particles = [];
            const pCount = Math.floor((W * H) / 6000);
            for (let i = 0; i < pCount; i++) {
                spawnParticle(true);
            }
        }

        function spawnBlock(scatter) {
            const sz = Math.floor(Math.random() * 4 + 2) * 8; // 16–40px, múltiplos de 8
            const def = PALETTE.blocks[Math.floor(Math.random() * PALETTE.blocks.length)];
            blocks.push({
                x: scatter ? Math.random() * W : (Math.random() > 0.5 ? W + sz : -sz),
                y: scatter ? Math.random() * H : Math.random() * H,
                sz,
                def,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.3,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.005,
                alpha: Math.random() * 0.5 + 0.2,
            });
        }

        function spawnParticle(scatter) {
            particles.push({
                x: scatter ? Math.random() * W : Math.random() * W,
                y: scatter ? Math.random() * H : H + 4,
                vx: (Math.random() - 0.5) * 0.6,
                vy: -(Math.random() * 0.5 + 0.2),
                r: Math.random() * 2.5 + 0.5,
                color: PALETTE.particles[Math.floor(Math.random() * PALETTE.particles.length)],
                alpha: Math.random() * 0.8 + 0.2,
                life: 1,
                decay: Math.random() * 0.003 + 0.001,
            });
        }

        // ── Dibujar un bloque pixelado ────────────────────────────────────────
        function drawBlock(b) {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(b.rotation);
            ctx.globalAlpha = b.alpha;

            const s = b.sz;

            // Cara principal
            ctx.fillStyle = b.def.fill;
            ctx.fillRect(-s / 2, -s / 2, s, s);

            // Cara superior (isométrica simple)
            ctx.fillStyle = lighten(b.def.fill, 0.25);
            ctx.beginPath();
            ctx.moveTo(-s / 2, -s / 2);
            ctx.lineTo(s / 2, -s / 2);
            ctx.lineTo(s / 2 + s * 0.25, -s / 2 - s * 0.25);
            ctx.lineTo(-s / 2 + s * 0.25, -s / 2 - s * 0.25);
            ctx.closePath();
            ctx.fill();

            // Cara lateral
            ctx.fillStyle = darken(b.def.fill, 0.25);
            ctx.beginPath();
            ctx.moveTo(s / 2, -s / 2);
            ctx.lineTo(s / 2, s / 2);
            ctx.lineTo(s / 2 + s * 0.25, s / 2 - s * 0.25);
            ctx.lineTo(s / 2 + s * 0.25, -s / 2 - s * 0.25);
            ctx.closePath();
            ctx.fill();

            // Borde pixelado
            ctx.strokeStyle = b.def.stroke;
            ctx.lineWidth = 1;
            ctx.strokeRect(-s / 2, -s / 2, s, s);

            // Textura interna (grietas tipo End Stone)
            ctx.strokeStyle = darken(b.def.stroke, 0.3);
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(-s / 4, -s / 2); ctx.lineTo(-s / 4, s / 2);
            ctx.moveTo(s / 4,  -s / 2); ctx.lineTo(s / 4,  s / 2);
            ctx.moveTo(-s / 2, -s / 4); ctx.lineTo(s / 2, -s / 4);
            ctx.moveTo(-s / 2,  s / 4); ctx.lineTo(s / 2,  s / 4);
            ctx.stroke();

            ctx.restore();
        }

        // ── Helpers de color ──────────────────────────────────────────────────
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return [r,g,b];
        }
        function rgbToHex(r,g,b) {
            return '#' + [r,g,b].map(v => Math.min(255,Math.max(0,Math.round(v))).toString(16).padStart(2,'0')).join('');
        }
        function lighten(hex, amt) {
            const [r,g,b] = hexToRgb(hex);
            return rgbToHex(r + (255-r)*amt, g + (255-g)*amt, b + (255-b)*amt);
        }
        function darken(hex, amt) {
            const [r,g,b] = hexToRgb(hex);
            return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt));
        }

        // ── Loop de animación ─────────────────────────────────────────────────
        function draw() {
            tick++;

            // Fondo
            ctx.fillStyle = PALETTE.bg;
            ctx.fillRect(0, 0, W, H);

            // Nubes de nebulosa
            nebulaClouds.forEach(nc => {
                nc.x += nc.speed;
                if (nc.x > W + nc.rx) nc.x = -nc.rx;
                if (nc.x < -nc.rx)   nc.x = W + nc.rx;

                const grd = ctx.createRadialGradient(nc.x, nc.y, 0, nc.x, nc.y, Math.max(nc.rx, nc.ry));
                grd.addColorStop(0, nc.color);
                grd.addColorStop(1, 'transparent');
                ctx.globalAlpha = nc.alpha;
                ctx.beginPath();
                ctx.ellipse(nc.x, nc.y, nc.rx, nc.ry, 0, 0, Math.PI * 2);
                ctx.fillStyle = grd;
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // Estrellas con parpadeo
            stars.forEach(s => {
                const twinkle = Math.sin(tick * s.twinkleSpeed + s.twinkleOffset) * 0.4 + 0.6;
                ctx.globalAlpha = s.alpha * twinkle;
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Bloques
            blocks.forEach((b, i) => {
                b.x += b.vx;
                b.y += b.vy;
                b.rotation += b.rotSpeed;

                // Rebote suave en bordes
                if (b.x < -b.sz * 2 || b.x > W + b.sz * 2 || b.y < -b.sz * 2 || b.y > H + b.sz * 2) {
                    blocks.splice(i, 1);
                    spawnBlock(false);
                }
                drawBlock(b);
            });

            // Partículas del End
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                p.alpha = p.life;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    spawnParticle(false);
                    return;
                }

                ctx.globalAlpha = p.alpha * 0.85;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        // ── Init ──────────────────────────────────────────────────────────────
        window.addEventListener('resize', resize);
        resize();
        draw();
    })();
    </script>

</body>
</html>
